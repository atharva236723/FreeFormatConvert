<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Free Format Convert — a 100% client-side file converter">
  <defs>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0%" stop-color="#007cf0"/>
      <stop offset="34%" stop-color="#7928ca"/>
      <stop offset="68%" stop-color="#ff0080"/>
      <stop offset="100%" stop-color="#ff4d4d"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7928ca" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff0080" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00dfd8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pillFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <style>
      .disp { font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif; font-weight: 800; }
      .mono { font-family: 'SFMono-Regular', 'Cascadia Code', Consolas, 'Liberation Mono', monospace; }
      .sans { font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif; }
      .pill { font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif; font-weight: 600; font-size: 21px; }
    </style>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="640" rx="0" fill="#0a0a0a"/>
  <rect x="1" y="1" width="1278" height="638" rx="0" fill="none" stroke="#1f1f1f" stroke-width="1"/>

  <!-- ambient glow orbs -->
  <g filter="url(#soft)" opacity="0.55">
    <circle cx="240" cy="120" r="150" fill="#7928ca"/>
    <circle cx="1060" cy="150" r="150" fill="#007cf0"/>
    <circle cx="640" cy="560" r="170" fill="#ff0080"/>
  </g>

  <!-- eyebrow -->
  <text x="640" y="118" text-anchor="middle" class="mono" font-size="17" letter-spacing="6" fill="#8f8f8f">100% CLIENT-SIDE FILE CONVERTER</text>

  <!-- wordmark -->
  <text x="640" y="232" text-anchor="middle" class="disp" font-size="98" letter-spacing="-3" fill="url(#wordmark)">Free Format Convert</text>

  <!-- gradient rule -->
  <rect x="360" y="268" width="560" height="3" rx="1.5" fill="url(#rule)"/>

  <!-- tagline -->
  <text x="640" y="322" text-anchor="middle" class="sans" font-size="27" fill="#d4d4d4">Images · Video · Audio · Documents · Ebooks —</text>
  <text x="640" y="360" text-anchor="middle" class="sans" font-size="27" fill="#8f8f8f">converted right inside your browser. Nothing is ever uploaded.</text>

  <!-- conversion pills -->
  <g transform="translate(60,412)">
    <g>
      <rect x="0" y="0" width="180" height="56" rx="28" fill="url(#pillFace)" stroke="#333333"/>
      <text x="90" y="36" text-anchor="middle" class="pill" fill="#ededed">PNG <tspan fill="#00dfd8">→</tspan> JPG</text>
    </g>
    <g transform="translate(196,0)">
      <rect x="0" y="0" width="180" height="56" rx="28" fill="url(#pillFace)" stroke="#333333"/>
      <text x="90" y="36" text-anchor="middle" class="pill" fill="#ededed">HEIC <tspan fill="#00dfd8">→</tspan> JPG</text>
    </g>
    <g transform="translate(392,0)">
      <rect x="0" y="0" width="180" height="56" rx="28" fill="url(#pillFace)" stroke="#333333"/>
      <text x="90" y="36" text-anchor="middle" class="pill" fill="#ededed">MP4 <tspan fill="#ff0080">→</tspan> MP3</text>
    </g>
    <g transform="translate(588,0)">
      <rect x="0" y="0" width="180" height="56" rx="28" fill="url(#pillFace)" stroke="#333333"/>
      <text x="90" y="36" text-anchor="middle" class="pill" fill="#ededed">GIF <tspan fill="#ff0080">→</tspan> MP4</text>
    </g>
    <g transform="translate(784,0)">
      <rect x="0" y="0" width="180" height="56" rx="28" fill="url(#pillFace)" stroke="#333333"/>
      <text x="90" y="36" text-anchor="middle" class="pill" fill="#ededed">PDF <tspan fill="#f9cb28">→</tspan> DOCX</text>
    </g>
    <g transform="translate(980,0)">
      <rect x="0" y="0" width="180" height="56" rx="28" fill="url(#pillFace)" stroke="#333333"/>
      <text x="90" y="36" text-anchor="middle" class="pill" fill="#ededed">DOCX <tspan fill="#f9cb28">→</tspan> PDF</text>
    </g>
  </g>

  <!-- privacy footer badge -->
  <g transform="translate(640,540)">
    <g transform="translate(-186,-22)">
      <rect x="0" y="0" width="372" height="44" rx="22" fill="#0f0f0f" stroke="#2a2a2a"/>
      <path d="M 30 15 a 8 8 0 0 1 16 0 v 5 h 3 a 3 3 0 0 1 3 3 v 12 a 3 3 0 0 1 -3 3 h -22 a 3 3 0 0 1 -3 -3 v -12 a 3 3 0 0 1 3 -3 h 3 z m 4 5 h 8 v -5 a 4 4 0 0 0 -8 0 z" fill="#50e3c2"/>
      <text x="205" y="28" text-anchor="middle" class="sans" font-size="18" font-weight="600" fill="#ededed">No upload · No account · Fully private</text>
    </g>
  </g>

  <!-- url -->
  <text x="640" y="608" text-anchor="middle" class="mono" font-size="16" letter-spacing="2" fill="#666666">freeformatconvert.com</text>
</svg>
